# Docker Compose configuration

version: '3'
services:
  maestro:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - MAESTRO_DB_URL=postgres://user:password@db:5432/database
  db:
    image: postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=database